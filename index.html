<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Netflix - Login</title>
</head>
<body>
 <header>
    <div class="logo">
        <a href="#">
            <img src="https://static.wikia.nocookie.net/youtv/images/5/54/Netflix_logo.png/revision/latest?cb=20180527192151" alt="logo">
        </a>
    </div>
 </header>
 <section class="container">
    <div class="login">
        <h2>Sign In</h2>
        <form class="box-input">
            <input type="email" placeholder="Email or phone number">
            <input type="password" placeholder="Password">
            <a href="#" class="btn">Sign In</a>
        </form>
        <div class="support">
            <div class="remenber">
              <span><input type="checkbox" id="check"></span>
              <label for="check">Remember me</label>
            </div>
            <div class="help">
                <a href="#">Need help?</a>
            </div>
        </div>
        <div class="footer">
            <p>New to Netflix?</p>
            <a href="#">Sign up now.</a>
        </div>
        <p class="description_footer">This page is protected by Google reCAPTCHA to 
         ensure you are not a robot. <span>Learn more.</span></p>
    </div>
 </section>
</body>
</html>
